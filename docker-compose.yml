# Store Intelligence System - full stack.
#   docker compose up --build
# Dashboard: http://localhost:8080   API: http://localhost:8000/docs
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      SIS_STREAM_BACKEND: redis
      SIS_REDIS_URL: redis://redis:6379/0
      SIS_DETECTOR_BACKEND: simulator
      SIS_SIM_PEOPLE: "18"
      SIS_CORS_ORIGINS: http://localhost:8080,http://localhost:5173
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
